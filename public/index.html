<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QuickBooks Integration Tool</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1>QuickBooks Online Import Tool</h1>
      <p>Upload Excel &bull; Map Data &bull; Sync to QuickBooks</p>
    </header>

    <section class="card">
      <h2>Step 1: Select Data Type</h2>
      <select id="entityType" class="input-select">
        <option value="">-- Select --</option>
        <option value="customer">Customer</option>
        <option value="vendor">Vendor</option>
        <option value="bill">Bill (from Purchase Order)</option>
      </select>
      <div id="fieldInfo" class="info-box"></div>
    </section>

    <section class="card">
      <h2>Step 2: Upload Excel File</h2>
      <input type="file" id="fileInput" accept=".xlsx,.xls,.csv" class="input-file">
      <div id="uploadStatus" class="status-msg"></div>
    </section>

    <section class="card" id="previewSection" style="display:none">
      <h2>Step 3: Preview &amp; Map Columns</h2>
      <div class="mapping-grid" id="mappingContainer"></div>
      <div class="table-wrapper" id="tableWrapper"></div>
    </section>

    <section class="card" id="submitSection" style="display:none">
      <h2>Step 4: Submit to QuickBooks</h2>
      <button id="submitBtn" class="btn btn-primary">Send to QuickBooks</button>
      <div id="progress" class="progress-bar" style="display:none">
        <div class="progress-fill" id="progressFill"></div>
      </div>
      <div id="results" class="results"></div>
    </section>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="/app.js"></script>
</body>
</html>
