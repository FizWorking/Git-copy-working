<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Easy-Working - QuickBooks Bulk Importer</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div id="app">
    <aside id="sidebar" class="sidebar">
      <div class="sidebar-header">
        <h2>Easy-Working</h2>
        <p class="sidebar-sub">QuickBooks Importer</p>
      </div>
      <nav class="sidebar-nav">
        <a href="#/dashboard" class="nav-item active" data-page="dashboard">
          <span class="nav-icon">&#9632;</span> Dashboard
        </a>
        <a href="#/import" class="nav-item" data-page="import">
          <span class="nav-icon">&#9650;</span> Import
        </a>
        <a href="#/history" class="nav-item" data-page="history">
          <span class="nav-icon">&#9776;</span> History
        </a>
      </nav>
      <div class="sidebar-footer">
        <div class="user-info" id="userInfo">
          <span class="user-name">User</span>
        </div>
      </div>
    </aside>

    <main id="main">
      <div id="pageContent"></div>
    </main>
  </div>

  <div id="toast" class="toast hidden"></div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="js/api.js"></script>
  <script src="js/pages/dashboard.js"></script>
  <script src="js/pages/import.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
